<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOBILPAY 결제 테스트</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f5f5f5; color: #333; }
.header { background: #1a1a2e; color: #fff; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 20px; font-weight: 600; }
.header a { color: #8ecae6; text-decoration: none; font-size: 14px; }
.container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
.status-bar { background: #fff; border-radius: 8px; padding: 16px 24px; margin-bottom: 24px; display: flex; gap: 32px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.status-item { text-align: center; }
.status-item .num { font-size: 28px; font-weight: 700; }
.status-item .label { font-size: 12px; color: #888; margin-top: 4px; }
.num.total { color: #1a1a2e; }
.num.success { color: #2ecc71; }
.num.fail { color: #e74c3c; }
.num.pending { color: #f39c12; }
.section-title { font-size: 16px; font-weight: 600; margin: 24px 0 12px; color: #1a1a2e; }
.case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
.case-card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); transition: box-shadow .2s; }
.case-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.12); }
.case-id { font-size: 12px; color: #888; font-weight: 500; }
.case-name { font-size: 15px; font-weight: 600; margin: 6px 0 8px; }
.case-desc { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 14px; }
.tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 500; }
.tag-method { background: #e8f4fd; color: #1976d2; }
.tag-flow { background: #fce4ec; color: #c62828; }
.tag-call { background: #f3e5f5; color: #7b1fa2; }
.tag-noti { background: #e8f5e9; color: #2e7d32; }
.btn { display: inline-block; padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
.btn-primary { background: #1a1a2e; color: #fff; }
.btn-primary:hover { background: #16213e; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-outline { background: transparent; border: 1px solid #ddd; color: #666; }
.btn-outline:hover { border-color: #999; }
.case-actions { display: flex; gap: 8px; align-items: center; }
.run-status { font-size: 12px; margin-left: 8px; }
.run-status.running { color: #f39c12; }
.run-status.done { color: #2ecc71; }
.run-status.error { color: #e74c3c; }
.iframe-container { margin-top: 16px; border: 2px solid #ddd; border-radius: 8px; overflow: hidden; display: none; }
.iframe-container iframe { width: 100%; height: 620px; border: none; }
.warning-banner { background: #fff3e0; border: 1px solid #ff9800; border-radius: 8px; padding: 14px 20px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: #e65100; line-height: 1.5; }
.warning-banner .icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.warning-banner strong { color: #bf360c; }
</style>
</head>
<body>
<div class="header">
  <h1>MOBILPAY 결제 테스트 도구</h1>
  <a href="/results">결과 분석 대시보드 →</a>
</div>

<div class="container">
  <div class="status-bar" id="statusBar">
    <div class="status-item"><div class="num total" id="statTotal">-</div><div class="label">전체 테스트</div></div>
    <div class="status-item"><div class="num success" id="statSuccess">-</div><div class="label">성공</div></div>
    <div class="status-item"><div class="num fail" id="statFail">-</div><div class="label">실패</div></div>
    <div class="status-item"><div class="num pending" id="statPending">-</div><div class="label">대기중</div></div>
  </div>

  <div id="caseContainer"></div>
</div>

<script>
let cases = [];

async function loadCases() {
  cases = await fetch('/api/cases').then(r => r.json());
  renderCases();
  loadStats();
}

const sectionMeta = {
  MC: { title: '휴대폰결제 (MC) 테스트 케이스', warning: '' },
  CN: {
    title: '신용카드 (CN) 테스트 케이스',
    warning: `<div class="warning-banner">
      <span class="icon">⚠</span>
      <div><strong>신용카드는 테스트서버를 제공하지 않습니다.</strong> 운영서버(mup.mobilians.co.kr)에서 실제 결제가 발생합니다.<br>테스트 후 반드시 결제취소를 진행해주세요.</div>
    </div>`
  },
};

function renderCases() {
  const container = document.getElementById('caseContainer');
  const groups = {};
  cases.forEach(c => {
    if (!groups[c.cashCode]) groups[c.cashCode] = [];
    groups[c.cashCode].push(c);
  });

  container.innerHTML = Object.entries(groups).map(([code, list]) => {
    const meta = sectionMeta[code] || { title: `${code} 테스트 케이스`, warning: '' };
    return `
      <div class="section-title">${meta.title}</div>
      ${meta.warning}
      <div class="case-grid">
        ${list.map(c => `
          <div class="case-card" id="card-${c.id}">
            <div class="case-id">${c.id}</div>
            <div class="case-name">${c.name}</div>
            <div class="case-desc">${c.description}</div>
            <div class="tags">
              <span class="tag tag-method">${c.cashCodeName}</span>
              <span class="tag tag-flow">${c.hybridPay === 'Y' ? '하이브리드' : '일반결제'}</span>
              <span class="tag tag-call">${c.callTypeName}</span>
              ${c.useNotiUrl ? '<span class="tag tag-noti">noti_url</span>' : ''}
            </div>
            <div class="case-actions">
              <button class="btn btn-primary" onclick="startTest('${c.id}')">테스트 시작</button>
              <button class="btn btn-outline" onclick="location.href='/results?case=${c.id}'">이력</button>
              <span class="run-status" id="status-${c.id}"></span>
            </div>
            ${c.callType === 'I' ? '<div class="iframe-container" id="iframe-' + c.id + '"><iframe></iframe></div>' : ''}
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

async function startTest(caseId) {
  const statusEl = document.getElementById('status-' + caseId);
  const btn = event.target;
  btn.disabled = true;
  statusEl.className = 'run-status running';
  statusEl.textContent = '거래등록 중...';

  try {
    const res = await fetch('/api/test/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ caseId }),
    });
    const data = await res.json();

    if (!data.success) {
      statusEl.className = 'run-status error';
      statusEl.textContent = '거래등록 실패: ' + data.error;
      btn.disabled = false;
      return;
    }

    statusEl.className = 'run-status running';
    statusEl.textContent = `거래등록 완료 (${data.runId}). 결제창 오픈 중...`;

    const tc = cases.find(c => c.id === caseId);
    if (tc.callType === 'P') {
      // Popup
      const w = tc.cashCode === 'CN' ? 820 : 390;
      const h = tc.cashCode === 'CN' ? 600 : 613;
      const left = (screen.width - w) / 2;
      const top = (screen.height - h) / 2;
      window.open(data.payUrl, 'mobilpay_payment',
        `width=${w},height=${h},left=${left},top=${top},scrollbars=yes`);
    } else if (tc.callType === 'S') {
      // Self — 새 탭으로 열기 (현재 페이지 유지 위해)
      window.open(data.payUrl, '_blank');
    } else if (tc.callType === 'I') {
      // iframe
      const container = document.getElementById('iframe-' + caseId);
      container.style.display = 'block';
      container.querySelector('iframe').src = data.payUrl;
    }

    statusEl.textContent = `결제 진행 중... (${data.runId})`;

    // 결과 폴링
    pollResult(data.runId, caseId);
  } catch (err) {
    statusEl.className = 'run-status error';
    statusEl.textContent = '오류: ' + err.message;
  }
  btn.disabled = false;
}

async function pollResult(runId, caseId) {
  const statusEl = document.getElementById('status-' + caseId);
  let attempts = 0;
  const maxAttempts = 120; // 2분

  const timer = setInterval(async () => {
    attempts++;
    try {
      const r = await fetch('/api/result/' + runId).then(r => r.json());
      if (r.verdict === 'success') {
        statusEl.className = 'run-status done';
        statusEl.textContent = `✓ 성공 (${runId})`;
        clearInterval(timer);
        loadStats();
      } else if (r.verdict === 'fail') {
        statusEl.className = 'run-status error';
        statusEl.textContent = `✗ 실패: ${r.verdictReason} (${runId})`;
        clearInterval(timer);
        loadStats();
      } else if (attempts >= maxAttempts) {
        statusEl.className = 'run-status error';
        statusEl.textContent = `타임아웃 (${runId})`;
        clearInterval(timer);
      }
    } catch {}
  }, 1000);
}

async function loadStats() {
  const results = await fetch('/api/results').then(r => r.json());
  document.getElementById('statTotal').textContent = results.length;
  document.getElementById('statSuccess').textContent = results.filter(r => r.verdict === 'success').length;
  document.getElementById('statFail').textContent = results.filter(r => r.verdict === 'fail').length;
  document.getElementById('statPending').textContent = results.filter(r => r.verdict === 'pending').length;
}

// 팝업/Self 결제 완료 감지
window.addEventListener('message', (e) => {
  if (e.data?.type === 'payment_closed') {
    loadStats();
  }
});

loadCases();
</script>
</body>
</html>
